<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" type="text/javascript"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="index.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div x-data="main">
        <div id="error" x-show="error">
            <span x-text="error"></span>
            <button @click="error=undefined">X</button>
        </div>
        <div id="hint" x-show="hint" x-text="hint"></div>
        <div id="qr-code-scanner" x-init="initScanner"></div>
        <form x-data="{ manualID: '' }" @submit.prevent="handleID(manualID)">
            <input type="text" x-model="manualID" placeholder="Gruppen- oder Admin-ID">
            <button :disabled="!manualID">&#x2713;</button>
        </form>
        <button @click="createNewEvent">Neues Event</button>
    </div>
</body>

</html>
